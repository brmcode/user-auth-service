info:
  name: register_login
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/api/auth/register_login"
  body:
    type: json
    data: |-
      {
          "email": "{{$randomEmail}}",
          "first_name": "{{$randomFirstName}}",
          "last_name": "{{$randomLastName}}",
          "image_url":"https://picsum.photos/200",
          "password": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
